name: Update NFL Forecasts

on:
  schedule:
    # Runs every Tuesday at 9:00 AM UTC
    - cron: "0 9 * * 2"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecasts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast update
        run: |
          python src/predict_upcoming.py

      - name: Commit updated forecast files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/predictions/

          if git diff --cached --quiet; then
            echo "No forecast changes to commit."
          else
            git commit -m "Update weekly NFL forecasts"
            git push
          fi